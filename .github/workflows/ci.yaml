name: CI Pipeline
on:
  push:
    branches:
      - main
      - feature/*
  pull_request:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 🔹 Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 🔹 Print branch
      - name: Show branch
        run: echo "Running on branch ${{ github.ref_name }}"

      # 🔹 Set up Docker
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # Configure AWS credentials

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
    
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Set image variables
        run: |
          echo "ECR_REGISTRY=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com" >> $GITHUB_ENV
          echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV

      # 🔹 Build Backend Image
      - name: Build and Push Backend Image
        run: |
          docker build -t backend-app ./src/backend-otl/
          docker tag backend-app:latest $ECR_REGISTRY/backend-app:$IMAGE_TAG
          docker push $ECR_REGISTRY/backend-app:$IMAGE_TAG

      # 🔹 Build Frontend Image
      - name: Build Frontend Image
        run: |
          docker build -t frontend-app ./src/frontend-otl/
          docker tag frontend-app:latest $ECR_REGISTRY/frontend-app:$IMAGE_TAG
          docker push $ECR_REGISTRY/frontend-app:$IMAGE_TAG

      # 🔹 Build DB Image (optional but included for completeness)
      - name: Build DB Image
        run: |
          docker build -t postgres-db ./src/db-otl/
          docker tag postgres-db:latest $ECR_REGISTRY/postgres-db:$IMAGE_TAG
          docker push $ECR_REGISTRY/postgres-db:$IMAGE_TAG

      - name: Basic validation
        run: echo "All images built successfully ✅"