name: CI Pipeline
on:
  push:
    branches:
      - main
      - feature/*
  pull_request:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 🔹 Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 🔹 Print branch
      - name: Show branch
        run: echo "Running on branch ${{ github.ref_name }}"

      # 🔹 Set up Docker
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 🔹 Build Backend Image
      - name: Build Backend Image
        run: |
          docker build -t backend-app ./src/backend-otl/

      # 🔹 Build Frontend Image
      - name: Build Frontend Image
        run: |
          docker build -t frontend-app ./src/frontend-otl/

      # 🔹 Build DB Image (optional but included for completeness)
      - name: Build DB Image
        run: |
          docker build -t postgres-db ./src/db-otl/
  
      - name: Basic validation
        run: echo "All images built successfully ✅"